name: MacroSage SHORT dashboard

# ---------------------------------------------------------------------------
# Triggers
#   * workflow_dispatch: lets you run it on demand from the Actions tab.
#   * schedule: 22:17 UTC (cron '17 22'), Monday-Friday. 22:17 UTC is ~17:17-18:17 New York
#     time (after the 16:00 US market close, in both winter EST and summer EDT)
#     and ~06:00 the next morning in Perth (AWST = UTC+8). Running Mon-Fri UTC
#     lines up with US trading days. GitHub cron is ALWAYS in UTC.
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      fmp_force_fail:
        description: "Force FMP to return empty so the free fallback tier is exercised (test only)."
        type: boolean
        default: false
  schedule:
    - cron: '17 22 * * 1-5'

# Allow the run to push state.json (last-known-value cache + ledger) to the
# dedicated 'state' branch. main is never written by this workflow.
permissions:
  contents: write

# Never let two runs overlap (prevents racing on the state.json commit).
concurrency:
  group: short-dashboard
  cancel-in-progress: false

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify dependencies and compile
        run: |
          python -m pip install --upgrade pip
          if grep -qE '^[^#[:space:]]' requirements.txt; then
            echo "Installing pinned dependencies..."
            pip install -r requirements.txt
          else
            echo "No third-party dependencies (Python standard library only)."
          fi
          python -m py_compile short_dashboard.py
          echo "Syntax/compile check passed."

      - name: Restore state.json from the state branch
        continue-on-error: true
        run: |
          # Pull the persisted last-known-value cache + signal ledger from the
          # 'state' branch into the working tree before the run. Fail-safe: if the
          # branch or file is absent, fall back to the committed seed / fresh start.
          if git fetch origin "+refs/heads/state:refs/remotes/origin/state" --depth=1 2>/dev/null && git cat-file -e refs/remotes/origin/state:state.json 2>/dev/null; then
            git cat-file -p refs/remotes/origin/state:state.json > state.json
            echo "Restored state.json from the state branch."
          else
            echo "No state branch yet; using the committed seed or starting fresh."
          fi

      - name: Run dashboard
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          # TEST SEAM (workflow input only; not a secret): when true, short_dashboard.py
          # forces the FMP path empty so the free fallback tier can be verified. Empty on schedule.
          FMP_FORCE_FAIL: ${{ inputs.fmp_force_fail }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python short_dashboard.py

      - name: Persist state.json to the state branch
        if: always()
        continue-on-error: true
        run: |
          # State (last-known-value cache + signal ledger) persists on a dedicated
          # 'state' branch, NOT main, so main stays code-only and branch-protectable.
          # Git plumbing is used so the working tree / main are never touched.
          # Fail-safe: any error here never fails the run (the email is already sent).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "+refs/heads/state:refs/remotes/origin/state" --depth=1 2>/dev/null || true
          blob=$(git hash-object -w state.json)
          cur=$(git rev-parse --verify --quiet refs/remotes/origin/state:state.json || true)
          if [ "$blob" = "$cur" ]; then
            echo "state.json unchanged on the state branch; nothing to persist."
            exit 0
          fi
          tree=$(printf '100644 blob %s\tstate.json\n' "$blob" | git mktree)
          base=$(git rev-parse --verify --quiet refs/remotes/origin/state || true)
          if [ -n "$base" ]; then
            new=$(git commit-tree "$tree" -p "$base" -m "chore: update last-known market values [skip ci]")
          else
            new=$(git commit-tree "$tree" -m "chore: seed last-known market values [skip ci]")
          fi
          git push origin "$new:refs/heads/state"
          echo "state.json persisted to the state branch ($new)."
