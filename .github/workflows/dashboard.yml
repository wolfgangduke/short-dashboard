name: MacroSage SHORT dashboard

on:
  schedule:
    # 22:00 UTC, Monday-Friday = after the US market close
    # (4pm ET close + buffer). Friday's run lands Saturday morning AU time.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run dashboard
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python short_dashboard.py
