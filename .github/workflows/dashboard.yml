name: MacroSage SHORT dashboard

on:
  workflow_dispatch:  # keeps the manual trigger too
    schedule:
        - cron: '30 21 * * 1-5'  # 9:30 PM UTC = 4:30 PM ET, Mon-Fri

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run dashboard
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python short_dashboard.py
