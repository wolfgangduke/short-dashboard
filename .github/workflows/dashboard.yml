name: MacroSage SHORT dashboard

on:
  schedule:
    # 12:00 UTC, Monday-Friday (pre-open weekdays)
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dashboard
        env:
          # Mapped to the repo secret names that actually exist:
          #   FRED -> FRED_API_KEY, GMAIL_USER -> EMAIL_ADDRESS,
          #   GMAIL_APP_PASSWORD -> EMAIL_PASSWORD, MAIL_TO -> EMAIL_TO
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED }}
          EMAIL_ADDRESS: ${{ secrets.GMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.MAIL_TO }}
        run: python short_dashboard_email.py
